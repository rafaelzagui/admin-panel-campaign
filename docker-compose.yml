services:
  admin-panel-campaign:
    build:
      context: .
      args:
        VITE_CAMPAIGN_API_URL: /api
        VITE_DISPATCH_API_URL: /dispatch-api
    container_name: admin-panel-campaign
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      CAMPAIGN_API_PROXY_TARGET: http://72.60.60.152:3001
      DISPATCH_API_PROXY_TARGET: http://72.60.60.152:3002
    extra_hosts:
      - "host.docker.internal:host-gateway"
